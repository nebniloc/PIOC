name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "pioc-v*"

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm run ci

      - name: Prepare production Tauri config
        run: pnpm run prepare:prod-config

      - name: Build and publish signed PIOC release
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.prod.generated.conf.json
          tagName: pioc-v__VERSION__
          releaseName: PIOC v__VERSION__
          releaseBody: See the assets below to install PIOC. Production builds can update themselves from this release.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
